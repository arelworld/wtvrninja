<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rage Slice</title>

<style>
:root{
    --sage:#A8BBA3;
    --sage-dark:#7D9277;
    --bg:#EDF4EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:linear-gradient(180deg,var(--bg),#dce8d8);
    font-family:Arial,sans-serif;
}

#topBar{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    display:flex;
    gap:10px;
    align-items:center;
    background:white;
    padding:10px 15px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

button,label{
    background:var(--sage);
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:12px;
    cursor:pointer;
}

input{
    display:none;
}

#score{
    font-size:20px;
    color:var(--sage-dark);
    font-weight:bold;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

.flying{
    position:absolute;
    width:120px;
    height:120px;
    object-fit:cover;
    user-select:none;
    pointer-events:none;
    border-radius:15px;
}

.sliceTrail{
    position:absolute;
    width:20px;
    height:20px;
    background:white;
    border-radius:50%;
    pointer-events:none;
    opacity:.7;
    animation:fade .3s linear forwards;
}

@keyframes fade{
    to{
        opacity:0;
        transform:scale(3);
    }
}

.particle{
    position:absolute;
    width:10px;
    height:10px;
    background:var(--sage-dark);
    border-radius:50%;
    pointer-events:none;
}

#combo{
    position:fixed;
    top:80px;
    width:100%;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:var(--sage-dark);
    pointer-events:none;
}
</style>
</head>

<body>

<div id="topBar">
    <label>
        Upload Pics
        <input type="file" id="upload" multiple accept="image/*">
    </label>
    <button id="startBtn">Start</button>
    <div id="score">Score: 0</div>
</div>

<div id="combo"></div>
<div id="game"></div>

<audio id="sliceSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9fd8f0.mp3?filename=swoosh-6435.mp3">
</audio>

<script>

const game=document.getElementById("game");
const upload=document.getElementById("upload");
const scoreText=document.getElementById("score");
const comboText=document.getElementById("combo");
const sound=document.getElementById("sliceSound");

let images=[];
let score=0;
let combo=0;

upload.addEventListener("change",e=>{
    images=[];
    [...e.target.files].forEach(file=>{
        const reader=new FileReader();
        reader.onload=()=>{
            images.push(reader.result);
        };
        reader.readAsDataURL(file);
    });
    alert("Images loaded!");
});

document.getElementById("startBtn").onclick=()=>{
    if(images.length===0){
        alert("Upload pictures first!");
        return;
    }
    setInterval(spawnImage,700);
};

function spawnImage(){
    const img=document.createElement("img");
    img.className="flying";
    img.src=images[Math.floor(Math.random()*images.length)];
    
    const size=90+Math.random()*60;
    img.style.width=size+"px";
    img.style.height=size+"px";
    
    // FIX: Append to DOM first
    game.appendChild(img);
    
    // FIX: Get fresh dimensions after append
    const maxX = window.innerWidth - size;
    const startX = Math.random() * maxX;
    
    img.x = startX;
    img.y = window.innerHeight + 100;
    img.vx = (Math.random() - 0.5) * 6;
    img.vy = -(12 + Math.random() * 5);
    
    img.style.left = img.x + "px";
    img.style.top = img.y + "px";
    
    animate(img);
}

function animate(img){
    function frame(){
        img.vy+=0.25;
        img.x+=img.vx;
        img.y+=img.vy;
        img.style.left=img.x+"px";
        img.style.top=img.y+"px";
        if(img.y>window.innerHeight+200){
            img.remove();
            return;
        }
        requestAnimationFrame(frame);
    }
    frame();
}

let lastX=0;
let lastY=0;

function trail(x,y){
    const t=document.createElement("div");
    t.className="sliceTrail";
    t.style.left=x+"px";
    t.style.top=y+"px";
    game.appendChild(t);
    setTimeout(()=>t.remove(),300);
}

function explode(x,y){
    for(let i=0;i<20;i++){
        const p=document.createElement("div");
        p.className="particle";
        p.style.left=x+"px";
        p.style.top=y+"px";
        game.appendChild(p);
        const dx=(Math.random()-0.5)*200;
        const dy=(Math.random()-0.5)*200;
        p.animate([
            {transform:'translate(0,0)',opacity:1},
            {transform:`translate(${dx}px,${dy}px)`,opacity:0}
        ],{
            duration:600
        });
        setTimeout(()=>p.remove(),600);
    }
}

function slice(x,y){
    document.querySelectorAll(".flying").forEach(img=>{
        const rect=img.getBoundingClientRect();
        if(
            x>rect.left &&
            x<rect.right &&
            y>rect.top &&
            y<rect.bottom
        ){
            score++;
            combo++;
            scoreText.innerText="Score: "+score;
            comboText.innerText="COMBO x"+combo;
            setTimeout(()=>{
                comboText.innerText="";
            },800);
            sound.currentTime=0;
            sound.play();
            if(navigator.vibrate){
                navigator.vibrate(40);
            }
            explode(
                rect.left+rect.width/2,
                rect.top+rect.height/2
            );
            img.remove();
        }
    });
}

document.addEventListener("mousemove",e=>{
    trail(e.clientX,e.clientY);
    slice(e.clientX,e.clientY);
    lastX=e.clientX;
    lastY=e.clientY;
});

document.addEventListener("touchmove",e=>{
    const t=e.touches[0];
    trail(t.clientX,t.clientY);
    slice(t.clientX,t.clientY);
    lastX=t.clientX;
    lastY=t.clientY;
},{passive:true});

</script>
</body>
</html>
