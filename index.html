<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Photo Fruit Ninja</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#d8e2dc;
    font-family:Arial,sans-serif;
}

#game{
    display:block;
}

.ui{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    display:flex;
    gap:12px;
    align-items:center;
    background:rgba(255,255,255,.9);
    padding:12px 18px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.upload{
    background:#7d9d8c;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

#score{
    color:#4d6a5c;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="ui">
    <label class="upload">
        Upload Photos
        <input id="upload" type="file" accept="image/*" multiple hidden>
    </label>

    <div id="score">Score: 0</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

const uploaded = [];
const fruits = [];
const particles = [];
const trail = [];

let score = 0;

document.getElementById("upload").addEventListener("change",(e)=>{

    uploaded.length = 0;

    [...e.target.files].forEach(file=>{

        const reader = new FileReader();

        reader.onload = ev => {

            const img = new Image();

            img.onload = ()=>uploaded.push(img);

            img.src = ev.target.result;
        };

        reader.readAsDataURL(file);
    });

});

class Fruit{

    constructor(img){

        this.img = img;

        this.size = 110 + Math.random()*30;

        this.x = Math.random()*(canvas.width-this.size);

        this.y = canvas.height + 150;

        this.vx = (Math.random()-0.5)*5;

        this.vy = -(13 + Math.random()*5);

        this.gravity = 0.18;

        this.rotation = Math.random()*Math.PI;

        this.rotationSpeed = (Math.random()-0.5)*0.08;

        this.type = Math.floor(Math.random()*4);
    }

    update(){

        this.vy += this.gravity;

        this.x += this.vx;
        this.y += this.vy;

        this.rotation += this.rotationSpeed;
    }

    createFruitPath(){

        if(this.type===0){

            ctx.moveTo(0,-55);

            ctx.bezierCurveTo(
                65,-90,
                90,25,
                0,70
            );

            ctx.bezierCurveTo(
                -90,25,
                -65,-90,
                0,-55
            );

        }else if(this.type===1){

            ctx.arc(0,0,60,0,Math.PI*2);

        }else if(this.type===2){

            ctx.moveTo(0,-70);

            ctx.bezierCurveTo(
                60,-40,
                70,60,
                0,75
            );

            ctx.bezierCurveTo(
                -70,60,
                -60,-40,
                0,-70
            );

        }else{

            ctx.arc(0,0,62,0,Math.PI*2);
        }
    }

    draw(){

        ctx.save();

        ctx.translate(
            this.x + this.size/2,
            this.y + this.size/2
        );

        ctx.rotate(this.rotation);

        ctx.beginPath();

        this.createFruitPath();

        ctx.closePath();

        ctx.clip();

        ctx.drawImage(
            this.img,
            -this.size/2,
            -this.size/2,
            this.size,
            this.size
        );

        ctx.restore();

        ctx.save();

        ctx.translate(
            this.x + this.size/2,
            this.y + this.size/2
        );

        ctx.rotate(this.rotation);

        ctx.beginPath();

        this.createFruitPath();

        ctx.strokeStyle="#557c69";
        ctx.lineWidth=4;
        ctx.stroke();

        ctx.restore();
    }
}

class Particle{

    constructor(x,y){

        this.x=x;
        this.y=y;

        this.vx=(Math.random()-0.5)*10;
        this.vy=(Math.random()-0.5)*10;

        this.life=35;

        this.size=Math.random()*7+2;
    }

    update(){

        this.x+=this.vx;
        this.y+=this.vy;

        this.life--;
    }

    draw(){

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fillStyle="#7d9d8c";
        ctx.fill();
    }
}

function spawnFruit(){

    if(uploaded.length===0) return;

    const img =
        uploaded[
            Math.floor(Math.random()*uploaded.length)
        ];

    fruits.push(new Fruit(img));
}

setInterval(spawnFruit,900);

function slice(x,y){

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        const cx = f.x + f.size/2;
        const cy = f.y + f.size/2;

        const dx = x - cx;
        const dy = y - cy;

        const distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < 60){

            if(navigator.vibrate){
                navigator.vibrate(25);
            }

            for(let p=0;p<25;p++){
                particles.push(
                    new Particle(cx,cy)
                );
            }

            score++;

            document.getElementById("score").innerText =
            "Score: " + score;

            fruits.splice(i,1);
        }
    }
}

function move(x,y){

    trail.push({x,y});

    if(trail.length>20){
        trail.shift();
    }

    slice(x,y);
}

canvas.addEventListener("mousemove",e=>{
    move(e.clientX,e.clientY);
});

canvas.addEventListener("touchmove",e=>{

    e.preventDefault();

    const t=e.touches[0];

    move(t.clientX,t.clientY);

},{passive:false});

function drawTrail(){

    if(trail.length<2) return;

    ctx.beginPath();

    ctx.moveTo(
        trail[0].x,
        trail[0].y
    );

    for(const p of trail){

        ctx.lineTo(
            p.x,
            p.y
        );
    }

    ctx.strokeStyle="#557c69";
    ctx.lineWidth=7;
    ctx.lineCap="round";

    ctx.shadowBlur=20;
    ctx.shadowColor="#557c69";

    ctx.stroke();

    ctx.shadowBlur=0;
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=fruits.length-1;i>=0;i--){

        fruits[i].update();
        fruits[i].draw();

        if(fruits[i].y > canvas.height+250){
            fruits.splice(i,1);
        }
    }

    for(let i=particles.length-1;i>=0;i--){

        particles[i].update();
        particles[i].draw();

        if(particles[i].life<=0){
            particles.splice(i,1);
        }
    }

    drawTrail();

    requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
