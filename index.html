<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arl Note Pro HD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{ --bg:#f3f4f6; --card:#ffffff; --text:#111827; }
.dark{ --bg:#111827; --card:#1f2937; --text:#f9fafb; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; padding:15px; display:flex; flex-direction:column; align-items:center; }

.toolbar{ width:100%; max-width:450px; background:var(--card); padding:10px; display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,.1); align-items:center; }
.toolbar button, .toolbar select, .toolbar input[type="color"]{ border:none; padding:8px; cursor:pointer; font-weight:bold; border-radius:4px; }
.saveBtn{ background:#007aff; color:white; }

/* Highlighter Container */
.highlighter-wrapper { position: relative; display: flex; align-items: center; }
#highlightPicker { opacity: 0; position: absolute; width: 30px; cursor: pointer; }

#note{
    width:100%; max-width:450px; min-height:400px; background:var(--card); color:var(--text);
    border-radius:0; padding:25px; outline:none; box-shadow:0 10px 30px rgba(0,0,0,.1);
    line-height:1.7; font-size:18px; overflow-wrap:break-word;
}
.status{ margin-top:10px; font-size:12px; opacity:.7; }
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="document.execCommand('bold', false, null)"><b>B</b></button>
    <button onclick="document.execCommand('underline', false, null)"><u>U</u></button>
    
    <div class="highlighter-wrapper" title="Highlight">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4l4 4-10 10-4 4-4-4 4-4 10-10zM12 8l4 4"/></svg>
        <input type="color" id="highlightPicker" value="#ffff00">
    </div>

    <input type="color" id="fontColor" title="Text Color" onchange="document.execCommand('foreColor', false, this.value)">
    <button onclick="document.body.classList.toggle('dark')">🌓</button>
    <button class="saveBtn" onclick="saveImage()">Save HD</button>
</div>

<div id="note" contenteditable="true">
    <h2>My Note</h2>
    <p>Select text, then click the highlighter icon or formatting buttons.</p>
</div>

<div class="status" id="status">Saved</div>

<script>
const note = document.getElementById("note");
const highlightPicker = document.getElementById("highlightPicker");

// Fix: Use 'hiliteColor' for background text highlighting
highlightPicker.addEventListener("input", (e) => {
    document.execCommand('styleWithCSS', false, true);
    document.execCommand('hiliteColor', false, e.target.value);
});

note.addEventListener("input", () => localStorage.setItem("arlNote", note.innerHTML));
window.onload = () => { if(localStorage.getItem("arlNote")) note.innerHTML = localStorage.getItem("arlNote"); };

async function saveImage(){
    const canvas = await html2canvas(note, { scale: 5, backgroundColor: null, width: note.offsetWidth, height: note.offsetHeight });
    const link = document.createElement("a");
    link.download = "Arl-Note-HD.png";
    link.href = canvas.toDataURL("image/png", 1.0);
    link.click();
}
</script>
</body>
</html>
